<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Identity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0A0A0A;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Mobile Warning */
        .mobile-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0A0A0A;
            z-index: 10000;
            padding: 40px 20px;
            text-align: center;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .mobile-warning.show { display: flex; }
        .mobile-warning h2 { color: #DC2626; font-size: 24px; margin-bottom: 15px; }
        .mobile-warning p { color: #999; font-size: 16px; line-height: 1.6; }
        .mobile-warning .highlight { color: #2563EB; font-weight: 600; }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        /* Step 1: Intro Message */
        .intro-step {
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        .intro-step.hide {
            opacity: 0;
            pointer-events: none;
            display: none;
        }
        .intro-step h2 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #fff;
        }
        .intro-step p {
            color: #999;
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* Buttons */
        .btn {
            background: linear-gradient(135deg, #2563EB, #1E40AF);
            color: #fff;
            border: none;
            padding: 16px 45px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(37, 99, 235, 0.6);
        }
        .btn-red {
            background: linear-gradient(135deg, #DC2626, #991B1B);
            box-shadow: 0 10px 30px rgba(220, 38, 38, 0.4);
        }
        .btn-red:hover {
            box-shadow: 0 15px 40px rgba(220, 38, 38, 0.6);
        }
        .btn.hide { display: none; }

        /* Step 2: Video */
        .video-step {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .video-step.show {
            display: block;
            opacity: 1;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(37, 99, 235, 0.3);
            margin-bottom: 25px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        /* Step 3: PDF */
        .pdf-step {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }
        .pdf-step.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
        .pdf-container {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .pdf-viewer {
            width: 100%;
            height: 1000px;
            border: none;
        }
        .scroll-hint {
            color: #2563EB;
            padding: 15px;
            background: rgba(37, 99, 235, 0.1);
            font-size: 14px;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0A0A0A;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .loading.hide { display: none; }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(37,99,235,0.3);
            border-top-color: #2563EB;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .mobile-warning.show { display: flex !important; }
            .container { display: none; }
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <!-- Mobile Warning -->
    <div class="mobile-warning" id="mobileWarning">
        <h2>⚠️ يرجى استخدام كمبيوتر</h2>
        <p>
            هذا العرض مصمم لشاشة <span class="highlight">الكمبيوتر</span><br>
            يرجى التبديل إلى لابتوب أو ديسكتوب
        </p>
    </div>

    <!-- Main Content -->
    <div class="container">
        
        <!-- Step 1: Intro -->
        <div class="intro-step" id="introStep">
            <h2>مقدمة الفيديو</h2>
            <p>شاهد مقدمة قصيرة للتعرف على الهوية البصرية</p>
            <button class="btn" id="btnWatch">▶ شاهد الفيديو</button>
        </div>

        <!-- Step 2: Video -->
        <div class="video-step" id="videoStep">
            <div class="video-wrapper">
                <iframe 
                    id="vimeoPlayer"
                    src="https://player.vimeo.com/video/1196949125?title=0&byline=0&portrait=0&controls=1&muted=0"
                    allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
                    allowfullscreen>
                </iframe>
            </div>
            <button class="btn btn-red hide" id="btnShowPdf">
                عرض الهوية الكاملة ←
            </button>
        </div>

        <!-- Step 3: PDF -->
        <div class="pdf-step" id="pdfStep">
            <div class="pdf-container">
                <div class="scroll-hint">مرر للأسفل لاستكشاف الدليل ↓</div>
                <iframe src="pdf.pdf" class="pdf-viewer"></iframe>
            </div>
        </div>

    </div>

    <script>
        // Mobile detection
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768) {
            document.getElementById('mobileWarning').classList.add('show');
        }

        // Hide loading
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('loading').classList.add('hide'), 400);
        });

        // Elements
        const introStep = document.getElementById('introStep');
        const videoStep = document.getElementById('videoStep');
        const pdfStep = document.getElementById('pdfStep');
        const btnWatch = document.getElementById('btnWatch');
        const btnShowPdf = document.getElementById('btnShowPdf');
        const vimeoPlayer = document.getElementById('vimeoPlayer');

        // Watch Button Click
        btnWatch.addEventListener('click', () => {
            introStep.classList.add('hide');
            videoStep.classList.add('show');
            
            // Enable autoplay with sound
            const src = vimeoPlayer.src;
            vimeoPlayer.src = src.includes('autoplay') ? src : src + '&autoplay=1';
        });

        // Listen for video end
        window.addEventListener('message', function(e) {
            if (e.origin.indexOf('vimeo') > -1 && e.data.event === 'ended') {
                btnShowPdf.classList.remove('hide');
            }
        }, false);

        // Fallback: show button after 13 seconds (11s video + 2s buffer)
        setTimeout(() => {
            if (!btnShowPdf.classList.contains('show')) {
                btnShowPdf.classList.remove('hide');
            }
        }, 13000);

        // Show PDF Button Click
        btnShowPdf.addEventListener('click', () => {
            videoStep.style.display = 'none';
            pdfStep.classList.add('show');
            pdfStep.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
